[INCLUDE: common/custom_emissive.ini]
[INCLUDE: common/selflighting.ini]
[INCLUDE: common/no_popup_lights.ini]
[INCLUDE: common/materials_interior.ini]
[INCLUDE: ref.ini]
[INCLUDE: Dash_Light.ini]


;--------------------------------------------------------------------------------
; General settings
;--------------------------------------------------------------------------------
[DATA]
DISABLE_LIGHTSINI = 1

[EXTRA_FX]
MASK_GBUFFER = body.036,body.035,body.034,body.033                         ; Meshes that allow light to pass through
SKIP_GBUFFER = mesh                        ; Meshes excluded from light passthrough


;--------------------------------------------------------------------------------
; High beam and low beam system
;--------------------------------------------------------------------------------
[EMISSIVE_HIGHBEAM_...]           ; High beam with low-beam fallback compatibility
NAME=body.018,body.011            ; Target meshes, left and right lights
COLOR=255,255,255,0.5             ; Emissive color, R,G,B,intensity
FALLBACK_LOWBEAM_COLOR=255,255,255,0.3 ; Fallback color in low-beam mode, R,G,B,intensity
LAG=0                             ; Response delay, 0 = instant
SIMULATE_HEATING=0.3              ; Filament afterglow effect, higher value = more visible
LOCATION=FRONT                    ; Light position, front

[LIGHT_HEADLIGHT_1]                         ; Physical headlight effect
COLOR=255,255,255,0.1		                   ; Color, R,G,B,intensity
POSITION = 0, 0.532, 2.07                  ; Position offset, X,Y,Z
MIRROR = 0.583                             ; Symmetrical position on X axis
DIRECTION = 0,-0.045, 3.2                  ; Beam direction
RANGE_FIRSTPERSON = 720.0                  ; First-person visible range, meters
RANGE_CARS_NEARBY = 260.0                  ; Visible range for nearby cars, meters
RANGE_CARS_DISTANT = 200.0                 ; Visible range for distant cars, meters
RANGE_GRADIENT_OFFSET = 0.02               ; Light falloff gradient offset
FADE_FROM = 40.0                           ; Fade start distance, meters
FADE_TO = 900.0                            ; Full fade distance, meters
SPOT = 33.0                                ; Primary spotlight angle
SPOT_SHARPNESS = 0.30                      ; Spotlight edge sharpness
SPOT_EDGE = 0.10, 0.11, 0.12               ; Spotlight edge tint
SPOT_EDGE_SHARPNESS = 4.0                  ; Spotlight edge transition sharpness
SECOND_SPOT = 50.0                         ; Secondary spotlight angle
SECOND_SPOT_SHARPNESS = 0.20               ; Secondary spotlight edge sharpness
SECOND_SPOT_SKIP = 0.22                    ; Secondary spotlight skipped area
SECOND_SPOT_RANGE = 80.0                  ; Secondary spotlight range
SECOND_SPOT_INTENSITY = 0.70               ; Secondary spotlight intensity

[SelfLight_Headlights]  Physical high/low beam front light - 01
BIND_TO_HEADLIGHTS = 1         ; Bind to headlight switch, 1 = active when headlights are on
COLOR = 255,255,255, 10.0       ; Light color, RGB, plus brightness intensity
MIRROR=0.585, 0, 0                         ; Mirror control, all zeros = mirror disabled
POSITION=0,0.495, 2.07           ; Light source position coordinates, local space
DIRECTION=0, 0, 1              ; Light direction, forward
SPOT=180                                ; Spotlight angle
RANGE=0.28                             ; Lighting radius range, 0.06 unit reference
RANGE_GRADIENT_OFFSET= -0.2    ; Light falloff offset, affects edge transition
SPECULAR_MULT=5                ; Specular reflection intensity, affects reflections
DIFFUSE_CONCENTRATION = 1      ; Diffuse concentration, light spread amount

[SelfLight_Headlights]  Physical low beam front light - 01
BIND_TO_HEADLIGHTS = 1         ; Bind to headlight switch, 1 = active when headlights are on
COLOR = 255,255,255, 10.0       ; Light color, RGB, plus brightness intensity
MIRROR=0.403, 0, 0                         ; Mirror control, all zeros = mirror disabled
POSITION=0, 0.527, 2.1           ; Light source position coordinates, local space
DIRECTION=0, 0, 1              ; Light direction, forward
SPOT=180                                ; Spotlight angle
RANGE=0.38                             ; Lighting radius range, 0.06 unit reference
RANGE_GRADIENT_OFFSET= -0.2    ; Light falloff offset, affects edge transition
SPECULAR_MULT=5                ; Specular reflection intensity, affects reflections
DIFFUSE_CONCENTRATION = 1      ; Diffuse concentration, light spread amount



;--------------------------------------------------------------------------------
; Brake light and position light system
;--------------------------------------------------------------------------------

[EMISSIVE_BRAKE_1]                         ; Inner brake light
NAME = body.025          ; Target mesh name
COLOR=200,0,0,0.4.0		 ; Color, red, green, blue, intensity
FALLBACK_HEADLIGHTS_COLOR = 200,0,0,0.1.0       ; Position light mode color
DIFFUSE_CONCENTRATION = 950                ; Diffuse concentration
EXTERIOR_ONLY = 0                          ; Exterior only
INTERIOR_ONLY = 0                          ; Interior only
AFFECTS_TRACK = 0                          ; Affects track
SIMULATE_HEATING = 0                       ; Simulate heat effect
LAG = 0.8                                  ; Response delay
FADE_AT = 0                               ; Fade start distance, meters

[EMISSIVE_BRAKE_2]                         ; Outer brake light
NAME = body.032           ; Target mesh name
COLOR=250,0,0,5.0		 ; Color, red, green, blue, intensity
FALLBACK_HEADLIGHTS_COLOR = 250,0,0,2.5       ; Position light mode color
DIFFUSE_CONCENTRATION = 950                ; Diffuse concentration
EXTERIOR_ONLY = 0                          ; Exterior only
INTERIOR_ONLY = 0                          ; Interior only
AFFECTS_TRACK = 0                          ; Affects track
SIMULATE_HEATING = 0                       ; Simulate heat effect
LAG = 0.8                                  ; Response delay
FADE_AT = 0                               ; Fade start distance, meters

[EXTRA_FX_EMISSIVE_...]                    ; Physical brake light diffusion
MESHES = body.025    ; Target mesh name
RANGE = 0.015                              ; Influence range, meters
COLOR=200,0,0,0.0.8		 ; Color, red, green, blue, intensity
DIRECTED = 0                               ; Whether it is a directional light
DISABLE_WITH_EMISSIVE_LIGHT = 1            ; Whether to work together with emissive light
INTERIOR_ONLY = 0                          ; Interior only
EXTERIOR_ONLY = 0                          ; Exterior only

[LIGHT_BRAKE_...]                            ; Rear position light / brake light physical projection
BOUND_TO = body.025  ; Bound mesh
AFFECTS_TRACK = 1                          ; Affects track
BOUND_EMISSIVE_MAX =900                   ; Maximum bound emissive value
BOUND_EXP = 1.35                           ; Bound exponent
COLOR=30,10,1,0.3		 ; Color, red, green, blue, intensity
DIFFUSE_CONCENTRATION = 0.82               ; Diffuse concentration
POSITION = 0.0, 0.80, -2.15                ; Position
DIRECTION = 0, -0.15, -0.985               ; Direction
MIRROR = 0.66                         ; Mirror position
MIRROR_DIRECTION = 0                       ; Mirror direction
RANGE = 3.0                                ; Range
RANGE_GRADIENT_OFFSET = 0.20               ; Range gradient offset
FADE_AT = 160                              ; Fade start distance, meters
FADE_SMOOTH = 22                           ; Fade smoothness
SPOT = 110                                 ; Spotlight angle
SPOT_SHARPNESS = 0.55                      ; Spotlight edge sharpness
SPOT_EDGE = 0.07, 0.07, 0.07               ; Spotlight edge tint
SPOT_EDGE_SHARPNESS = 16                   ; Spotlight edge transition sharpness
SPECULAR_MULT = 1.3                        ; Specular reflection multiplier
SINGLE_FREQUENCY = 1                       ; Single frequency
EXTERIOR_ONLY = 1                          ; Exterior only
INTERIOR_ONLY = 0                          ; Interior only

;--------------------------------------------------------------------------------
; Turn signal system
;--------------------------------------------------------------------------------

Left front
[EMISSIVE_TURNSIGNAL_LEFT_...]   ; Front left turn signal
NAME=body.020
COLOR=250,50,0,1.0                 ; Emissive color, R,G,B,intensity
LAG = 0.8                                  ; Response delay
SIMULATE_HEATING=0.0            ; Filament afterglow effect, 0 = off, >0 gradually turns yellow
CAST_LIGHT = 1                             ; Cast light
LOCATION = FRONT                           ; Light source position


Right front
[EMISSIVE_TURNSIGNAL_RIGHT_...]   ; Front right turn signal
NAME=body.069
COLOR=250,50,0,1.0                 ; Emissive color, R,G,B,intensity
LAG = 0.8                                  ; Response delay
SIMULATE_HEATING=0.0            ; Filament afterglow effect, 0 = off, >0 gradually turns yellow
CAST_LIGHT = 1                             ; Cast light
LOCATION = FRONT                           ; Light source position


Left rear
[EMISSIVE_TURNSIGNAL_LEFT_...]   ; Rear left turn signal, outer
NAME=body.063
COLOR=250,50,0,5                ; Emissive color, R,G,B,intensity
FALLBACK_BRAKES_COLOR=250,0,0,5 ; Fallback color when sharing brake light source, R,G,B,intensity
FALLBACK_HEADLIGHTS_COLOR=250,0,0,2.5 ; Fallback color in position light mode, R,G,B,intensity
LAG = 0.8                                  ; Response delay
SIMULATE_HEATING=0.0            ; Filament afterglow effect, 0 = off, >0 gradually turns yellow
CAST_LIGHT = 1                             ; Cast light
LOCATION = REAR                           ; Light source position

[EMISSIVE_TURNSIGNAL_LEFT_...]   ; Rear left turn signal, inner
NAME=body.071
COLOR=200,50,0,0.4              ; Emissive color, R,G,B,intensity
FALLBACK_BRAKES_COLOR=200,0,0,0.4 ; Fallback color when sharing brake light source, R,G,B,intensity
FALLBACK_HEADLIGHTS_COLOR=200,0,0,0.2 ; Fallback color in position light mode, R,G,B,intensity
LAG = 0.8                                  ; Response delay
SIMULATE_HEATING=0.0            ; Filament afterglow effect, 0 = off, >0 gradually turns yellow
CAST_LIGHT=0                    ; Whether to cast light, 0 = off, 1 = on

Right rear
[EMISSIVE_TURNSIGNAL_RIGHT_...]   ; Rear right turn signal, outer
NAME=body.065
COLOR=250,50,0,5                ; Emissive color, R,G,B,intensity
FALLBACK_BRAKES_COLOR=250,0,0,5 ; Fallback color when sharing brake light source, R,G,B,intensity
FALLBACK_HEADLIGHTS_COLOR=250,0,0,2.5 ; Fallback color in position light mode, R,G,B,intensity
LAG = 0.8                                  ; Response delay
SIMULATE_HEATING=0.0            ; Filament afterglow effect, 0 = off, >0 gradually turns yellow
CAST_LIGHT = 1                             ; Cast light
LOCATION = REAR                           ; Light source position

[EMISSIVE_TURNSIGNAL_RIGHT_...]   ; Rear right turn signal, inner
NAME=body.070
COLOR=200,50,0,0.4              ; Emissive color, R,G,B,intensity
FALLBACK_BRAKES_COLOR=200,0,0,0.4 ; Fallback color when sharing brake light source, R,G,B,intensity
FALLBACK_HEADLIGHTS_COLOR=200,0,0,0.2 ; Fallback color in position light mode, R,G,B,intensity
LAG = 0.8                                  ; Response delay
SIMULATE_HEATING=0.0            ; Filament afterglow effect, 0 = off, >0 gradually turns yellow
CAST_LIGHT=0                    ; Whether to cast light, 0 = off, 1 = on

;--------------------------------------------------------------------------------
; Reverse light system
;--------------------------------------------------------------------------------
[EMISSIVE_REVERSE_1]                       ; Reverse light
NAME = body.066,body.031                                ; Bound lamp cover meshes
COLOR = 255,255,255,0.1                   ; Light color, R,G,B,intensity
SIMULATE_HEATING = 0                       ; Whether to simulate heat
LAG = 0.3                                  ; Response delay
CAST_LIGHT = 1                             ; Whether to cast light
LOCATION = REAR                            ; Light source position

;--------------------------------------------------------------------------------
; License plate light system
;--------------------------------------------------------------------------------

[LIGHT_LICENSEPLATE]            ; License plate light, actual light source
MESHES=body.040                     ; Target mesh, light attachment point
OFFSET=0.00,0.0,-0.0         ; Position offset, X,Y,Z, meters
RANGE=0.30                      ; Illumination range, meters
RANGE_GRADIENT_OFFSET=0.20      ; Range falloff offset, affects edge transition
SPOT=280                        ; Spotlight angle, degrees
SPOT_SHARPNESS=0.30             ; Spotlight edge sharpness, 0 = soft, 1 = sharp
COLOR=1.35,1.35,1.35,20         ; Light source color, R,G,B,intensity
FALLBACK_EMISSIVE=3.0,3.0,2.7,0.5 ; Emissive compensation when no light source is active, R,G,B,intensity
FADE_AT=18                      ; Distance fade start, meters
LAYOUT=TWO_ON_TOP               ; Light layout, two lights stacked vertically

