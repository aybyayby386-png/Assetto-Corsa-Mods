[INCLUDE: common/materials_interior.ini]
[INCLUDE: common/materials_glass.ini]
[INCLUDE: common/materials_carpaint.ini]
[INCLUDE: common/materials_interior.ini]
[INCLUDE: common/materials_carpaint.ini]
[INCLUDE: common/materials_glass.ini]
[INCLUDE: pbr.ini]


CarPaintMaterial = CAR_PAINT

[SHADER_REPLACEMENT_...]
MATERIALS = CAR_PAINT
DOUBLE_FACE_SHADOW_BIASED = 1

;--------------------------------------------------------------------------------
; PBR Material System - Glass
;--------------------------------------------------------------------------------

[Material_Glass]  ; Exterior glass material configuration
Materials = glass_ext      ; Base glass material name (main texture defining glass appearance)
MaskPass = 2               ; Mask channel (controls transparency or special effects)
MaskPassColor = 0, 0.2, 0.1 ; Mask channel color (RGB values for blending/effects)
IOR = 1.6                  ; Index of refraction for realistic light bending
FilmIOR = 1.8              ; Coating layer index of refraction
ThicknessMult = 1.3        ; Thickness multiplier, higher = thicker glass
BrightnessAdjustment = 0   ; Brightness adjustment
ExtraLightsAdjustment = 0  ; Additional light brightness adjustment
usenormalmap = 0           ; Enable normal map (1 = enabled)

[SHADER_REPLACEMENT_...]  ; Interior glass
MATERIALS = glass_int
IS_TRANSPARENT = 1

[Material_PhotoelasticGlass]               ; Headlight glass
Materials = glass_td
PhotoelasticityBaseScale = 5              ; Photoelastic base scale
PhotoelasticityNoiseScale = 0.35          ; Photoelastic noise scale
PhotoelasticitySpotsScale = 1.2           ; Photoelastic spot scale
PhotoelasticitySpotsOffset = 0.08         ; Photoelastic spot offset
PhotoelasticityStripesScale = 1           ; Photoelastic stripe scale
ProfileFix = 0.1                          ; Profile correction
ThicknessMult = 1.0                       ; Thickness multiplier
FilmIOR = 1.8                             ; Film layer IOR

[WINDSCREEN_REFLECTION]                    ; Interior windshield reflection
REFLECTING = shader:ksWindscreen           ; Reflection shader
SURFACE = ...                              ; Reflection surface mesh
FILTER_ELEMENTS = 1                        ; Filter elements
REBUILD_NORMALS = 1                        ; Rebuild normals
SHOT_DIRECTION = X, Y, Z                   ; Capture direction
SHOT_ORIGIN = X, Y, Z                      ; Capture origin
SHOT_SIZE = W, H                           ; Capture size
MOVE_WITH = ...                            ; Follow movement node
DEBUG_MESH = 0                             ; Debug mesh (1 = enabled)
REFLECTED = COCKPIT_HR, STEER_HR,          ; Reflected nodes
REFLECTED_EXCLUDE = ...                    ; Excluded reflected nodes
REFLECTED_DRIVER = 1                       ; Reflect driver
REFLECTED_TRANSPARENT = 1                  ; Reflect transparent meshes
DEPTH_OFFSET = 0.005                       ; Depth offset
APPLY_DEPTH_FIX = 1                        ; Apply depth fix
CURVATURE_FACTOR = 0.5                     ; Curvature factor

;--------------------------------------------------------------------------------
; PBR Material System - Interior Metal and Plastic
;--------------------------------------------------------------------------------

[Material_Chrome]                          ; Brake disc
Materials = scp,chrome
Smoothness = 0.555                         ; Smoothness
Metalness = 0.9                            ; Metalness
Reflectance = 0.9                          ; Reflectance
BrightnessAdjustment = 0.58                ; Brightness adjustment
OcclusionMap = 0.4                         ; Ambient occlusion map
CubemapReflectionBlur = 0.3                ; Cubemap reflection blur

;--------------------------------------------------------------------------------
; PBR Material System - Carbon Fiber and Body Components
;--------------------------------------------------------------------------------

[Material_Carbon]  ; Carbon fiber material
Materials = CARBON_FIBER                   ; Base carbon texture
Reflectance = 0.15                         ; Reflection intensity
Smoothness = 0.50                          ; Surface smoothness
DetailNormalBlend = 1.0                    ; Detail normal blend strength
DetailScale = 800                           ; Detail texture scale
BrightnessAdjustment = 0.15                 ; Brightness adjustment
CubemapReflectionBlur = 0                   ; Reflection blur amount

;--------------------------------------------------------------------------------
; Shader Replacement - Plastic and Metal
;--------------------------------------------------------------------------------

[SHADER_REPLACEMENT_...]                   ; Gloss black plastic parts
MATERIALS = blackenvv
PROP_... = ksAmbient, 0.20                 ; Ambient light
PROP_... = ksDiffuse, 0.05                 ; Diffuse reflection
PROP_... = fresnelEXP, 2.5                 ; Fresnel exponent
PROP_... = fresnelMaxLevel, 0.12           ; Fresnel max level
PROP_... = isAdditive, 0                   ; Additive blending mode
PROP_... = useDetail, 1                    ; Enable detail texture
PROP_... = detailUVMultiplier, 50          ; Detail UV multiplier
PROP_... = sunSpecular, 0.02               ; Sun specular reflection
PROP_... = sunSpecularEXP, 100             ; Sun specular exponent
PROP_... = ksSpecular, 0.05                ; Specular reflection
PROP_... = ksSpecularEXP, 500              ; Specular exponent
PROP_... = fresnelC, 0.45                  ; Fresnel coefficient
PROP_... = clearCoatThickness, 0.12        ; Clear coat thickness
PROP_... = microTexture, 0.10              ; Micro texture

[SHADER_REPLACEMENT_...]                   ; Black chassis plastic parts
MATERIALS = PURE_BLACK
PROP_... = ksAmbient, 0.15                 ; Ambient light
PROP_... = ksDiffuse, 0.14                 ; Diffuse reflection
PROP_... = fresnelEXP, 2.0                 ; Fresnel exponent
PROP_... = fresnelMaxLevel, 0.10           ; Fresnel max level
PROP_... = isAdditive, 0                   ; Additive blending mode
PROP_... = useDetail, 1                    ; Enable detail texture
PROP_... = detailUVMultiplier, 160         ; Detail UV multiplier
PROP_... = sunSpecular, 0.08               ; Sun specular reflection
PROP_... = sunSpecularEXP, 90              ; Sun specular exponent
PROP_... = ksSpecular, 0.12                ; Specular reflection
PROP_... = ksSpecularEXP, 140              ; Specular exponent
PROP_... = fresnelC, 0.35                  ; Fresnel coefficient
PROP_... = clearCoatThickness, 0.08        ; Clear coat thickness
PROP_... = microTexture, 0.18              ; Micro texture

[SHADER_REPLACEMENT_...]                   ; Tire material
MATERIALS = TIRE
PROP_... = ksAmbient, 0.04                 ; Ambient light
PROP_... = ksDiffuse, 0.15                 ; Diffuse reflection
PROP_... = fresnelEXP, 0.6                 ; Fresnel exponent
PROP_... = fresnelMaxLevel, 0.06           ; Fresnel max level
PROP_... = isAdditive, 0                   ; Additive blending mode
PROP_... = useDetail, 1                    ; Enable detail texture
PROP_... = detailUVMultiplier, 40          ; Detail UV multiplier
PROP_... = sunSpecular, 0.25               ; Sun specular reflection
PROP_... = sunSpecularEXP, 45              ; Sun specular exponent
PROP_... = ksSpecular, 0.06                ; Specular reflection
PROP_... = ksSpecularEXP, 32               ; Specular exponent
PROP_... = fresnelC, 0.23                  ; Fresnel coefficient

[SHADER_REPLACEMENT_...]                   ; Seatbelt material
MATERIALS = belts
PROP_0 = ksAmbient, 0.08                   ; Ambient light
PROP_1 = ksDiffuse, 0.18                   ; Diffuse reflection
PROP_2 = fresnelMaxLevel, 0.05             ; Fresnel max level
PROP_3 = ksSpecular, 0.01                  ; Specular reflection
PROP_4 = ksSpecularEXP, 15                 ; Specular exponent
PROP_5 = microTexture, 0.08                ; Micro texture
PROP_6 = useDetail, 1                      ; Enable detail texture
PROP_7 = detailUVMultiplier, 0             ; Detail UV multiplier

;--------------------------------------------------------------------------------
; PBR Material System - Car Paint and Metal Parts
;--------------------------------------------------------------------------------

[Material_CarPaint_Metallic]               ; Brake caliper
CarPaintMaterial = hub
DisableDev = 1                             ; Disable developer mode
FresnelMax = 1.5                           ; Fresnel max level
FresnelC = 0.20                            ; Fresnel coefficient
FlakesK = 15                               ; Metallic flake density
BrightnessAdjustment = 0.3                 ; Brightness adjustment
SpecularBase = 0.8, 40                     ; Base specular (intensity, falloff)
SpecularSun = 0.1, 600                     ; Sunlight specular (intensity, falloff)
AmbientSpecular = 1                        ; Ambient specular reflection
AmbientSpecularEXP = 8.0                   ; Ambient specular exponent
UseDiffuseAlphaAsMask = 1                  ; Use diffuse alpha as mask
ClearCoatThickness = 0.5                   ; Clear coat thickness
UseMetallicReflections = 1.2               ; Enable metallic reflections

[Material_CarPaint_Metallic]               ; Metallic black parts
Materials = blackmat
UseMetallicReflections = 1.0               ; Enable metallic reflections
FresnelMax = 0.05                          ; Fresnel max level
FresnelC = 0.15                            ; Fresnel coefficient
FlakesK = 255                              ; Metallic flake density
AmbientSpecular = 0.5                      ; Ambient specular reflection
ColoredSpecular = 0                        ; Colored specular reflection
AmbientSpecularEXP = 5.5                   ; Ambient specular exponent
ClearCoatThickness = 0.05                  ; Clear coat thickness
BrightnessAdjustment = 0.1                 ; Brightness adjustment
SpecularBase = 0.05, 2.5                   ; Base specular (intensity, falloff)
SpecularSun = 0.005, 1.5                   ; Sunlight specular (intensity, falloff)
ApplyTilingFix = 1                         ; Apply tiling fix