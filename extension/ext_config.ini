[BASIC]
IS_LOW_BEAM_AVAILABLE = 1        ; Enable low beam headlights

[DATA]
DISABLE_ANALOGINSTRUMENTSINI = 0 ; Disable analog instrument configuration
DISABLE_LIGHTSINI = 1            ; Disable lights configuration file
DisableDev = 1                   ; Disable developer mode

[LIGHTING]
EMISSIVE_HEADLIGHTS_MULT = 1     ; Headlight emissive intensity multiplier
EMISSIVE_BRAKELIGHTS_MULT = 1    ; Brake light emissive intensity multiplier

[STATUS_BATTERY]
BASE_VOLTAGE = 12.4             ; Base voltage
MAX_VOLTAGE = 13.6              ; Maximum voltage
RPM_LAG = 0.98                  ; RPM response delay factor


==  Audio Volume Control Section  ==

[AUDIO_VOLUME]
ENGINE_EXT = 2.5       ; External engine sound volume
ENGINE_INT = 1.5       ; Internal cockpit engine sound volume
TURBO = 5.0            ; Turbocharger sound effects
TRANSMISSION = 1.0     ; Transmission and drivetrain noise
BACKFIRE_EXT = 5.0     ; External backfire sound
BACKFIRE_INT = 5.0     ; Internal cockpit backfire sound

; ==================== Driving Operation Sound Effects ====================
GEAR_EXT = 5.0         ; External gear shift sound
GEAR_INT = 5.0         ; Internal gear shift mechanical sound
DOWN_SHIFT = 5.0       ; Downshift throttle blip sound
GEAR_GRIND = 1.0       ; Gear grinding sound effect
LIMITER = 1.0          ; RPM limiter sound effect
HORN = 1.0             ; Horn volume

; ==================== Vehicle Dynamic Sound Effects ====================
BODYWORK = 1.0         ; Body vibration and friction sound
SKID_EXT = 1.0         ; External tire skid sound
SKID_INT = 1.0         ; Internal tire skid sound
TRACTION_CONTROL_EXT = 1.0  ; External traction control system sound
TRACTION_CONTROL_INT = 1.0  ; Internal traction control system sound

; ==================== Environmental Sound Effects ====================
WIND = 1.0             ; Wind noise
DIRT = 1.0             ; Gravel and dirt impact sound

==  Exhaust Flame Effects  ==
[EXHAUST_FLAMES]
ANTILAG=1                      ; Enable turbo anti-lag flames
ANTILAG_DELAY=0.0              ; Flame delay (seconds)
ANTILAG_INTENSITY=0.005        ; Flame size
ANTILAG_INTERVAL_MAX=0.1       ; Maximum flame interval
ANTILAG_INTERVAL_MIN=0.1       ; Minimum flame interval
ANTILAG_TURBO_THRESHOLD=1      ; Turbo threshold

; === Engine Damage Simulation ===
DAMAGE=0                       ; Disable flame-induced engine damage
DAMAGE_DURATION=0.00           ; Damage duration
DAMAGE_INTENSITY=0             ; Damage intensity
DAMAGE_PROBABILITY=0           ; Damage probability

; === Throttle Lift Flames (Discharge) ===
DISCHARGE=1                    ; Enable throttle lift flames
DISCHARGE_CHARGE_TIME=0.001    ; Throttle charge time (seconds)
DISCHARGE_DELAY=0.3            ; Flame delay after throttle release (seconds)
DISCHARGE_DURATION=1.2         ; Flame duration (seconds)
DISCHARGE_PROBABILITY=0.6      ; Flame probability
DISCHARGE_INTENSITY=28         ; Flame size
DISCHARGE_RPM_THRESHOLD_MAX=9000 ; Maximum RPM threshold
DISCHARGE_RPM_THRESHOLD_MIN=5500 ; Minimum RPM threshold
DISCHARGE_WATER_TEMPERATURE_THRESHOLD=70 ; Water temperature threshold (°C)

FLAT_SHIFT=1                   ; Enable flat-shift flames
FLAT_SHIFT_COOLDOWN=0          ; Cooldown after upshift (seconds)
FLAT_SHIFT_DURATION=0.25       ; Flame duration (seconds)
FLAT_SHIFT_GAS_THRESHOLD=75    ; Throttle input threshold (%)
FLAT_SHIFT_INTENSITY=22        ; Flame size
FLAT_SHIFT_PROBABILITY=85      ; Flame probability
FLAT_SHIFT_RPM_THRESHOLD=6800  ; RPM threshold

LIMITER=1                      ; Enable limiter flames
LIMITER_DELAY=0                ; Flame delay (seconds)
LIMITER_INTENSITY=9            ; Flame size
LIMITER_RPM_THRESHOLD=8200     ; RPM threshold

[PARTICLES_FX_EXHAUST_FLAMES]
COLOR_MULT=0.5, 0.45, 0.15, 1.0  ; Flame color multiplier
INTENSITY_MULT=0.9                ; Flame intensity multiplier
SIZE_MULT=0.05                    ; Flame size multiplier
TEMPERATURE_MULT=1.0              ; Temperature visual effect multiplier
